# Runs the same checks as the local pre-commit hook
# on every push and pull request.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux SDL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libasound2-dev \
            libwayland-dev \
            wayland-protocols \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxrender-dev \
            libxss-dev \
            libxkbcommon-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run formatting, linting, and tests
        run: make precommit
